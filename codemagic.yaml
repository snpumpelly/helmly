workflows:
  ios-testflight:
    name: Helmly iOS → TestFlight
    max_build_duration: 60
    environment:
      groups:
        - app-store
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6771184542"
        BUNDLE_ID: "com.helmly.app"
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Resolve Swift Package Manager dependencies
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath $CM_BUILD_DIR/ios/App/SourcePackages
      - name: Set up keychain and import certificate
        script: |
          keychain initialize
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password helmly2026
      - name: Set up provisioning profile
        script: |
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/Helmly_App_Store.mobileprovision
          xcode-project use-profiles --profile /tmp/Helmly_App_Store.mobileprovision
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

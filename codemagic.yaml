workflows:
  ios-testflight:
    name: Helmly iOS → TestFlight
    max_build_duration: 60
    environment:
      groups:
        - app-store
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6771184542"
        BUNDLE_ID: "com.helmly.app"
      xcode: 16.3
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Resolve Swift Package Manager dependencies
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath $CM_BUILD_DIR/ios/App/SourcePackages
      - name: Set up keychain and import certificate
        script: |
          keychain initialize
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password helmly2026
      - name: Set up provisioning profile
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Helmly_App_Store.mobileprovision
          echo "Profile UUID:"
          /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/Helmly_App_Store.mobileprovision)
      - name: Build IPA
        script: |
          set -x
          ARCHIVE_PATH=$CM_BUILD_DIR/build/ios/App.xcarchive
          IPA_DIR=$CM_BUILD_DIR/build/ios/ipa
          mkdir -p $IPA_DIR

          echo "=== Checking profile ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles dir"

          echo "=== Archiving ==="
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $ARCHIVE_PATH \
            -clonedSourcePackagesDirPath $CM_BUILD_DIR/ios/App/SourcePackages \
            -skipPackagePluginValidation \
            DEVELOPMENT_TEAM=66468M6T5D \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Helmly App Store" \
            archive 2>&1 | tee /tmp/xcode_build.log
          ARCHIVE_EXIT=$?
          echo "Archive exit code: $ARCHIVE_EXIT"
          test $ARCHIVE_EXIT -eq 0

          echo "=== Exporting IPA ==="
          python3 -c "import plistlib; d={'method':'app-store-connect','teamID':'66468M6T5D','signingStyle':'manual','provisioningProfiles':{'com.helmly.app':'Helmly App Store'}}; plistlib.dump(d, open('/tmp/ExportOptions.plist','wb')); print('plist written')"

          xcodebuild -exportArchive \
            -archivePath $ARCHIVE_PATH \
            -exportPath $IPA_DIR \
            -exportOptionsPlist /tmp/ExportOptions.plist 2>&1 | tee /tmp/export.log
          echo "=== IPA dir contents ==="
          ls -la $IPA_DIR/
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - /tmp/xcode_build.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

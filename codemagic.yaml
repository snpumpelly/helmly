workflows:
  ios-testflight:
    name: Helmly iOS → TestFlight
    max_build_duration: 60
    environment:
      groups:
        - app-store
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6771184542"
        BUNDLE_ID: "com.helmly.app"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up keychain and import certificate
        script: |
          keychain initialize
          echo $CERTIFICATE_PUBLIC_DATA | base64 --decode > /tmp/cert.cer
          echo "$CERTIFICATE_PRIVATE_KEY" > /tmp/cert.key
          openssl pkcs12 -export \
            -out /tmp/cert.p12 \
            -inkey /tmp/cert.key \
            -in /tmp/cert.cer \
            -passout pass:helmly2026
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password helmly2026
      - name: Set up provisioning profile
        script: |
          echo $PROVISIONING_PROFILE | base64 --decode > /tmp/Helmly_App_Store.mobileprovision
          xcode-project use-profiles --profile /tmp/Helmly_App_Store.mobileprovision
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

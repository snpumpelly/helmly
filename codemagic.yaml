workflows:
  ios-testflight:
    name: Helmly iOS → TestFlight
    max_build_duration: 60
    environment:
      groups:
        - app-store
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6771184542"
        BUNDLE_ID: "com.helmly.app"
      xcode: 16.3
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Resolve Swift Package Manager dependencies
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath $CM_BUILD_DIR/ios/App/SourcePackages
      - name: Set up keychain and import certificate
        script: |
          keychain initialize
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password helmly2026
      - name: Set up provisioning profile
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Helmly_App_Store.mobileprovision
          echo "Profile UUID:"
          /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/Helmly_App_Store.mobileprovision)
      - name: Build IPA
        script: |
          PROFILE_UUID=$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/Helmly_App_Store.mobileprovision | /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin)
          echo "Using profile UUID: $PROFILE_UUID"
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/ios/App.xcarchive \
            -clonedSourcePackagesDirPath $CM_BUILD_DIR/ios/App/SourcePackages \
            -skipPackagePluginValidation \
            DEVELOPMENT_TEAM=66468M6T5D \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Helmly App Store" \
            PROVISIONING_PROFILE=$PROFILE_UUID \
            archive 2>&1 | tee /tmp/xcode_build.log | tail -50
          echo "Exit: $?"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - /tmp/xcode_build.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

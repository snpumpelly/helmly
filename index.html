        parts:[

      /* ── Branch D: Hot soak / vapor lock ── */
      fix_vapor_lock: {
        type:'fix', difficulty:'easy',
        title:'Hot Soak / Vapor Lock — Wait and Ventilate',
        body:'When a hot engine is shut off, fuel can boil in the fuel line and form a vapor bubble that prevents restarting — this is vapor lock. It\'s common on older boats using ethanol-blend gas (E10/E15). **What to do:** (1) Open the engine hatch and wait 20–30 minutes for the fuel line to cool, (2) Crank with the throttle wide open for 5 seconds to purge vapor, (3) Return to idle and try a normal start. **Longer fix:** insulate the fuel line with split-foam tube, route it away from the exhaust manifold, or upgrade to a higher-flow fuel pump that keeps pressure up after shutdown.',

        type:'fix', difficulty:'moderate',
        title:'Replace the Outboard Water Pump Impeller',
        body:'On an outboard, the water pump lives **inside the lower unit**, so the boat must be **out of the water** (trailer or lift) for this job.\n\n**Overview:**\n1. Trim engine fully down, remove the prop and the prop nut/cotter pin.\n2. Remove the bolts securing the lower unit (6–10 bolts). The shift rod disconnects as you pull the unit down.\n3. The water pump housing sits at the very top of the lower unit where it meets the driveshaft. Remove the housing (4–6 bolts).\n4. Pull the impeller off the driveshaft — use an impeller puller if it\'s stuck. Flush any broken vane fragments out of the housing before installing the new impeller.\n5. Inspect the housing and wear plate for scoring. Replace the whole kit if grooved.\n6. Coat the new impeller with petroleum jelly. Press onto the shaft with vanes curved in the correct rotation direction (check your manual).\n7. Reassemble in reverse. Torque lower unit bolts to spec.\n\nBuy a **complete water pump kit** (housing, impeller, wear plate, gaskets) — not just an impeller — on engines over 5 years old.',

      fix_ib_impeller: {
        type:'fix', difficulty:'moderate',
        title:'Replace the Raw Water Pump Impeller (Inboard/Sterndrive)',
        body:'Unlike an outboard, the raw water pump on an inboard or I-O is mounted **directly on the engine** — so the boat does **not** need to come out of the water.\n\n**Procedure:**\n1. Locate the raw water pump — it has a hose coming from the seacock side and an outlet hose toward the heat exchanger. Usually a round cast-metal housing on the front of the engine, driven by a belt or gear.\n2. **Close the seacock.**\n3. Remove the pump cover (4–6 bolts). The impeller is inside the housing.\n4. Pull the impeller out with needle-nose pliers or an impeller puller. Check the housing interior for broken vane fragments — flush them all out before installing the new one.\n5. Coat the new impeller with dish soap or petroleum jelly. Press it in with vanes curled in the correct rotation direction (check your manual).\n6. Install a new cover gasket and replace the cover.\n7. Reopen the seacock. Run at idle and verify water flow from the exhaust or tell-tale.',

        body:'Switch has power but pump is dead — the fuse at the pump has likely blown.\n\nWhere to find it:\n- **On the pump itself:** Follow the red (+) wire coming into the pump. Most 12V pumps have an in-line fuse holder within 12–18 inches of the pump.\n- **At the fuse panel:** Look for a slot labeled "WATER PUMP," "FW PUMP," or "PUMP."\n\nFuse size is usually **10A or 15A**.',

        type:'fix', difficulty:'moderate',
        title:'No Power at Pump — Trace the Wiring',
        body:'Fuse is good, switch light is on, but no voltage at the pump. Power is being lost somewhere between the switch and the pump.\n\n**Step-by-step trace:**\n1. **Check the ground first:** Touch the black probe to the pump\'s black (−) wire terminal and red probe to the positive battery post. A reading of 12V here means the pump\'s ground connection is bad — clean and retighten the black wire at its hull/engine attachment point.\n\n2. **Check each connection along the red wire:** Follow the red wire back from the pump toward the switch. At each connector, terminal block, or butt connector, probe both sides. The connection where voltage disappears is the fault — clean it or re-terminate it with a new marine heat-shrink connector.\n\n3. **Check the switch for a built-in breaker:** Some rocker switches have a small **reset button on the back** of the switch body. Press it — a tripped breaker here cuts power to the pump even when the switch looks on.\n\n4. **Inspect for corrosion:** Spray CRC QD Electronic Cleaner on any connector that looks green, white, or crusty. Corroded connectors pass a visual check but have enough resistance to drop all 12V before it reaches the pump.',

    </div>
  );
}

/* ─────────────────────────────────────────────────────────────
   HARD-STOP CLASSIFIER (runs for ALL users — never bypassed)
   Returns a label string if the message matches a dangerous
   pattern, or null if it's safe to send to the AI.
   ───────────────────────────────────────────────────────────── */
const HARD_STOP_PATTERNS = [
  { pattern: /fuel.{0,20}leak|smell.{0,15}gas(oline)?|gas(oline)?.{0,15}smell|gas.{0,15}leak/i,      label: 'Possible fuel leak detected' },
  { pattern: /carbon.monoxide|co.{0,5}alarm|everyone.{0,20}(sick|ill|dizzy)|headache.{0,15}nausea/i,  label: 'Possible CO exposure' },
  { pattern: /fire.{0,10}(on|aboard|in).{0,5}boat|boat.{0,10}(is.on.)?fire|open.flame|on.fire/i,     label: 'Fire on board' },
  { pattern: /sinking|taking.on.water|water.rising.fast|flooding.fast|hull.breach/i,                  label: 'Taking on water' },
  { pattern: /electrical.fire|burning.smell.{0,20}wir|arc.flash|sparking.{0,15}fire/i,               label: 'Electrical fire' },
];

function getHardStop(text) {
  for (const { pattern, label } of HARD_STOP_PATTERNS) {
    if (pattern.test(text)) return label;
  }
  return null;
}

function getOrCreateClientId() {
  let id = localStorage.getItem('helmly_client_id');
  if (!id) { id = crypto.randomUUID(); localStorage.setItem('helmly_client_id', id); }
  return id;
}

function apiHeaders(clientId) {
  return { 'Content-Type': 'application/json', 'x-client-id': clientId };
}

/* ── AI Chat View ── */
function AIChatView({ onBack, clientId, boatId, boatLabel, boatDetails, capabilities, isDevMode }) {
  const [messages, setMessages] = React.useState([{
    role: 'assistant',
    content: (boatLabel ? `Ready to help with your ${boatLabel}. ` : '') + "What's going on with the boat? Describe the problem in your own words.",
    diagnosis: null
  }]);
  const [input, setInput] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [conversationId, setConversationId] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [hardStopLabel, setHardStopLabel] = React.useState(null);
  const bottomRef = React.useRef(null);

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  const sendMessage = async () => {
    const text = input.trim();
    if (!text || loading) return;

    // Hard-stop classifier — runs for ALL users, cannot be bypassed
    const stopLabel = getHardStop(text);
    if (stopLabel) {
      setInput('');
      setHardStopLabel(stopLabel);
      // Still log the attempted message in dev mode for audit
      if (isDevMode) {
        const convs = JSON.parse(localStorage.getItem(DEV_CONV_KEY) || '[]');
        convs.push({ ts: new Date().toISOString(), type: 'hardstop', label: stopLabel, text });
        localStorage.setItem(DEV_CONV_KEY, JSON.stringify(convs.slice(-100)));
      }
      return;
    }

    setInput('');
    setError(null);
    setHardStopLabel(null);
    setMessages(prev => [...prev, { role: 'user', content: text, diagnosis: null }]);
    setLoading(true);

    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: apiHeaders(clientId),
        body: JSON.stringify({
          message: text,
          conversationId,
          boatId: boatId || null,
          boat: boatDetails || null,
          capabilities: capabilities || null,
          history: messages.map(m => ({ role: m.role, content: m.content }))
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Server error');
      }

      const data = await res.json();
      if (!conversationId) setConversationId(data.conversationId);

      const reply = { role: 'assistant', content: data.reply, diagnosis: data.structuredDiagnosis || null };
      setMessages(prev => {
        const updated = [...prev, reply];
        // Persist conversation log in dev mode
        if (isDevMode) {
          const convs = JSON.parse(localStorage.getItem(DEV_CONV_KEY) || '[]');
          const existing = convs.findIndex(c => c.id === (data.conversationId || 'draft'));
          const entry = { id: data.conversationId || 'draft', ts: new Date().toISOString(), boat: boatLabel, messages: updated };
          if (existing >= 0) convs[existing] = entry; else convs.push(entry);
          localStorage.setItem(DEV_CONV_KEY, JSON.stringify(convs.slice(-50)));
        }
        return updated;
      });
    } catch (err) {
      if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError') || err.message.includes('PLACEHOLDER')) {
        setError('Worker not yet deployed. Update WORKER_URL in index.html after running: wrangler deploy');
      } else {
        setError(err.message);
      }
    } finally {
      setLoading(false);
    }
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  const reset = () => {
    setConversationId(null);
    setError(null);
    setHardStopLabel(null);
    setMessages([{ role: 'assistant', content: "New conversation started. What's the problem?", diagnosis: null }]);
  };

  return (
    <div className="flex flex-col h-screen max-w-xl mx-auto">
      {/* header */}
      <div className="flex items-center gap-3 px-4 py-4 border-b border-hull-800 shrink-0">
        <button onClick={onBack}
          className="w-9 h-9 rounded-full bg-hull-800 hover:bg-hull-700 flex items-center justify-center text-slate-300 transition-colors">
          ‹
        </button>
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 rounded-xl bg-gradient-to-br from-ocean-500 to-ocean-700 flex items-center justify-center shrink-0"><span className="text-white font-black text-sm" style={{letterSpacing:'-0.03em'}}>H</span></div>
          <div>
            <div className="font-semibold text-white text-sm">Marine Expert</div>
            <div className="text-xs text-ocean-400">Real-time diagnosis &amp; parts</div>
          </div>
        </div>
        <button onClick={reset}
          className="ml-auto text-xs text-slate-500 hover:text-slate-300 transition-colors">
          New Chat ↺
        </button>
      </div>

      {/* messages */}
      <div className="flex-1 overflow-y-auto px-4 pt-4 pb-2">

        {messages.map((m, i) => (
          <ChatBubble key={i} role={m.role} content={m.content} diagnosis={m.diagnosis}/>
        ))}

        {loading && (
          <div className="flex items-center gap-2 text-slate-500 text-sm mb-4">
            <div className="w-7 h-7 rounded-xl bg-gradient-to-br from-ocean-500 to-ocean-700 flex items-center justify-center shrink-0"><span className="text-white font-black text-xs" style={{letterSpacing:'-0.03em'}}>H</span></div>
            <div className="flex gap-1">
              <span className="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style={{animationDelay:'0ms'}}/>
              <span className="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style={{animationDelay:'150ms'}}/>
              <span className="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style={{animationDelay:'300ms'}}/>
            </div>
          </div>
        )}

        {hardStopLabel && (
          <HardStopCard label={hardStopLabel} onDismiss={() => setHardStopLabel(null)}/>
        )}

        {error && (
          <div className="mx-0 mb-4 px-4 py-3 rounded-xl bg-hull-800 border border-hull-700 text-slate-400 text-sm">
            {error}
          </div>
        )}

        {isDevMode && (
          <div className="mb-2 px-3 py-1.5 rounded-lg bg-hull-800 border border-amber-500/20 text-amber-500/70 text-xs text-center">
            Dev Mode · Msgs: {messages.length - 1} · ~${((messages.length - 1) * 0.003).toFixed(3)} est. cost
          </div>
        )}

        <div ref={bottomRef}/>
      </div>

      {/* disclaimer */}
      <div className="px-4 pt-1 pb-1 shrink-0">
        <p className="text-center text-slate-700 text-xs">Helmly assists. You decide. When in doubt, call a pro.</p>
      </div>

      {/* input */}
      <div className="px-4 pb-6 pt-2 shrink-0 border-t border-hull-800">
        <div className="flex gap-2">
          <textarea
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={handleKey}
            placeholder="Describe what's happening…"
            disabled={loading}
            rows={2}
            className="flex-1 px-4 py-3 rounded-xl bg-hull-800 border border-hull-700 text-white
                       placeholder-slate-600 focus:outline-none focus:border-ocean-500 text-sm
                       resize-none disabled:opacity-40 transition-colors"
          />
          <button onClick={sendMessage} disabled={!input.trim() || loading}
            className="w-11 h-11 mt-auto rounded-xl bg-ocean-600 hover:bg-ocean-500 disabled:opacity-30
                       text-white flex items-center justify-center transition-colors text-lg">
            ↑
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── DIAGNOSIS ENGINE ── */
function DiagnosisView({ tree, onBack, onOpenAI, boatId, clientId }) {
  const [nodeId, setNodeId] = useState(tree.start);
  const [history, setHistory] = useState([tree.start]);
  const [resolvedParts, setResolvedParts] = useState({});
  const col = COLOURS[tree.color] || COLOURS.blue;
  const node = tree.nodes[nodeId];

  const go = useCallback((nextId) => {
    setNodeId(nextId);
    setHistory(h => [...h, nextId]);
  }, []);

  const goBack = useCallback(() => {
    if (history.length <= 1) { onBack(); return; }
    const prev = history[history.length - 2];
    setHistory(h => h.slice(0,-1));
    setNodeId(prev);
  }, [history, onBack]);

  const restart = () => onBack();  // goes back to the full tree list (Home)

  // Resolve boat-specific parts URLs when landing on a terminal node
  React.useEffect(() => {
    if (!boatId || !node) return;
    if (!['fix', 'escalate', 'tip'].includes(node.type)) return;
    if (resolvedParts[nodeId]) return;
    const toResolve = (node.parts || []).filter(p => p.category);
    if (!toResolve.length) return;

    let cancelled = false;
    (async () => {
      const results = await Promise.all(
        (node.parts || []).map(async (p) => {
          if (!p.category) return null;
          try {
            const res = await fetch(
              `${API_BASE}/api/parts?category=${encodeURIComponent(p.category)}&boatId=${encodeURIComponent(boatId)}`,
              { headers: { 'x-client-id': clientId || 'anonymous' } }
            );
            if (!res.ok) return null;
            return await res.json();
          } catch { return null; }
        })
      );
      if (!cancelled) {
        const map = {};
        (node.parts || []).forEach((_, i) => { if (results[i]) map[i] = results[i]; });
        setResolvedParts(prev => ({ ...prev, [nodeId]: map }));
      }
    })();
    return () => { cancelled = true; };
  }, [nodeId, boatId]);

  if (!node) return <div className="text-red-400 p-4">Node not found: {nodeId}</div>;

  const stepNum = history.length;

  return (
    <div className="max-w-xl mx-auto px-4 pb-10">
      {/* header */}
      <div className="flex items-center gap-3 py-5">
        <button onClick={goBack}
          className="w-9 h-9 rounded-full bg-hull-800 hover:bg-hull-700 flex items-center justify-center text-slate-300 transition-colors">
          ‹
        </button>
        <div>
          <div className="flex items-center gap-2">
            <span className="text-xl">{tree.icon}</span>
            <span className="font-semibold text-white">{tree.label}</span>
          </div>
          <div className="text-xs text-slate-500 mt-0.5">Step {stepNum}</div>
        </div>
        <button onClick={restart}
          className="ml-auto text-xs text-slate-500 hover:text-slate-300 transition-colors">
          ← All Issues
        </button>
      </div>

      {/* progress bar */}
      <div className="h-1 rounded-full bg-hull-800 mb-6">
        <div className={`h-1 rounded-full ${col.badge} transition-all`}
          style={{width: Math.min(stepNum * 10, 95) + '%'}}/>
      </div>

      {/* node card */}
      <div className={`fade-in rounded-2xl border ${col.border} ${col.bg} p-5`}>

        {/* QUESTION */}
        {node.type === 'question' && <>
          <p className="text-slate-300 text-sm mb-1">Check this:</p>
          <p className="text-white text-lg font-medium mb-3 leading-snug">
            <MD text={node.question}/>
          </p>
          {node.hint && (
            <div className="flex gap-2 bg-hull-900/60 rounded-lg p-3 mb-4">
              <span className="text-ocean-400 mt-0.5">💡</span>
              <p className="text-slate-400 text-sm">{node.hint}</p>
            </div>
          )}
          <div className="flex flex-col gap-2 mt-4">
            {node.answers.map((a,i) => (
              <button key={i} onClick={() => go(a.next)}
                className="text-left px-4 py-3 rounded-xl bg-hull-800 hover:bg-ocean-700/50 border border-hull-700
                           hover:border-ocean-500/50 text-slate-200 text-sm transition-all card-hover">
                {a.text}
              </button>
            ))}
          </div>
        </>}

        {/* TIP */}
        {node.type === 'tip' && <>
          <div className="flex items-center gap-2 mb-3">
            <span className="text-xl">💡</span>
            <span className="font-semibold text-ocean-300">{node.title}</span>
          </div>
          <p className="text-slate-300 text-sm leading-relaxed mb-4">{node.body}</p>
          {node.parts && node.parts.length > 0 && (
            <div className="flex flex-col gap-2 mb-1">
              {node.parts.map((p,i) => {

            Continue →

/* ── EditBoatSheet ─────────────────────────────────────────── */
function EditBoatSheet({ onClose, onSave }) {
  const sd = React.useMemo(() => { try { return JSON.parse(localStorage.getItem(BOAT_DETAILS_KEY) || '{}'); } catch { return {}; } }, []);
  const sc = React.useMemo(() => { try { return JSON.parse(localStorage.getItem(CAPABILITIES_KEY) || '{}'); } catch { return {}; } }, []);

  const [engineType,       setEngineType]       = React.useState(sd.engineType  || '');
  const [engineMake,       setEngineMake]       = React.useState(sd.engineMake  || '');
  const [customEngineMake, setCustomEngineMake] = React.useState('');
  const [engineModel,      setEngineModel]      = React.useState(sd.engineModel || '');
  const [engineHp,         setEngineHp]         = React.useState(sd.engineHp    || '');
  const [make,             setMake]             = React.useState(sd.make        || '');
  const [customMake,       setCustomMake]       = React.useState('');
  const [model,            setModel]            = React.useState(sd.model       || '');
  const [year,             setYear]             = React.useState(sd.year        || '');
  const [hullLen,          setHullLen]          = React.useState(sd.hullLen     || '');
  const [boatType,         setBoatType]         = React.useState(sd.boatType    || '');
  const [saltwater,        setSaltwater]        = React.useState(sd.saltwater !== false);
  const [hvac,             setHvac]             = React.useState(sd.hvac        || '');

  const [hasShorePower,        setHasShorePower]        = React.useState(!!sc.hasShorePower);
  const [hasGenerator,         setHasGenerator]         = React.useState(!!sc.hasGenerator);
  const [hasHVAC,              setHasHVAC]              = React.useState(!!sc.hasHVAC);
  const [hasFreshwaterCooling, setHasFreshwaterCooling] = React.useState(!!sc.hasFreshwaterCooling);
  const [hasDualBattery,       setHasDualBattery]       = React.useState(!!sc.hasDualBattery);
  const [hasTrimTabs,          setHasTrimTabs]          = React.useState(!!sc.hasTrimTabs);
  const [hasBilgeBlower,       setHasBilgeBlower]       = React.useState(!!sc.hasBilgeBlower);
  const [steeringType,         setSteeringType]         = React.useState(sc.steeringType         || 'not_sure');
  const [hasFuelInjection,     setHasFuelInjection]     = React.useState(sc.hasFuelInjection     || 'not_sure');

  const [hasFwPump,              setHasFwPump]              = React.useState(!!sc.hasFwPump);
  const [hasRwPump,              setHasRwPump]              = React.useState(!!sc.hasRwPump);
  const [hasWindlass,            setHasWindlass]            = React.useState(!!sc.hasWindlass);
  const [windlassBrand,          setWindlassBrand]          = React.useState(sc.windlassBrand          || '');
  const [customWindlassBrand,    setCustomWindlassBrand]    = React.useState('');
  const [hasStereo,              setHasStereo]              = React.useState(!!sc.hasStereo);
  const [hasAmp,                 setHasAmp]                 = React.useState(!!sc.hasAmp);
  const [hasElectronics,         setHasElectronics]         = React.useState(!!sc.hasElectronics);
  const [electronicsBrand,       setElectronicsBrand]       = React.useState(sc.electronicsBrand       || '');
  const [customElectronicsBrand, setCustomElectronicsBrand] = React.useState('');
  const [generatorBrand,         setGeneratorBrand]         = React.useState(sc.generatorBrand         || '');
  const [customGeneratorBrand,   setCustomGeneratorBrand]   = React.useState('');

  const ic = "w-full px-3 py-2.5 rounded-xl bg-hull-900 border border-hull-700 text-white text-sm placeholder-slate-500 focus:outline-none focus:border-ocean-500 transition-colors";
  const lc = "block text-xs text-slate-400 mb-1";

  const save = () => {
    if (!engineType) return;
    const resolvedMake        = make === 'Other (type below)' ? customMake : make;
    const resolvedEngineMake  = engineMake === 'Other (type below)' ? customEngineMake : engineMake;
    const details = { make: resolvedMake, model, year, boatType, engineType, engineMake: resolvedEngineMake, engineModel, engineHp, hullLen, saltwater, hvac };
    const label   = [year, resolvedMake, model].filter(Boolean).join(' ') ||
                    ENGINE_TYPE_OPTIONS.find(o => o.value === engineType)?.label || '';
    const caps    = {
      hasShorePower, hasGenerator,
      generatorBrand: hasGenerator ? (generatorBrand === 'Other (type below)' ? customGeneratorBrand : generatorBrand) : null,
      hasHVAC, hasFreshwaterCooling, hasDualBattery, hasTrimTabs, hasBilgeBlower,
      steeringType, hasFuelInjection,
      hasFwPump, hasRwPump,
      hasWindlass, windlassBrand: hasWindlass ? (windlassBrand === 'Other (type below)' ? customWindlassBrand : windlassBrand) : null,
      hasStereo, hasAmp: hasStereo,
      hasElectronics, electronicsBrand: hasElectronics ? (electronicsBrand === 'Other (type below)' ? customElectronicsBrand : electronicsBrand) : null,
    };
    localStorage.setItem(BOAT_DETAILS_KEY, JSON.stringify(details));
    localStorage.setItem(BOAT_LABEL_KEY, label);
    localStorage.setItem(CAPABILITIES_KEY, JSON.stringify(caps));
    onSave({ label, details, capabilities: caps });
  };

  return (
    <div className="fixed inset-0 bg-hull-950/90 z-50 flex items-end" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="w-full max-h-[92vh] overflow-y-auto bg-hull-900 rounded-t-3xl border-t border-hull-700 px-5 pt-5 pb-10">
        {/* handle + header */}
        <div className="w-10 h-1 bg-hull-600 rounded-full mx-auto mb-4"/>
        <div className="flex items-center justify-between mb-5">
          <h2 className="text-white font-bold text-lg">Edit Boat Profile</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-white w-8 h-8 flex items-center justify-center text-2xl leading-none">×</button>
        </div>

        {/* boat fields */}
        <div className="space-y-3 mb-5">

          {/* ENGINE */}
          <p className="text-xs font-semibold text-slate-500 uppercase tracking-widest pt-1">Engine</p>
          <div>
            <label className={lc}>Engine type <span className="text-red-400">*</span></label>
            <select value={engineType} onChange={e => setEngineType(e.target.value)} className={ic + ' appearance-none'}>
              <option value="">Select engine type…</option>
              {ENGINE_TYPE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>
          <div>
            <label className={lc}>Engine make</label>
            <select value={engineMake} onChange={e => setEngineMake(e.target.value)} className={ic + ' appearance-none'}>
              <option value="">Select make…</option>
              {ENGINE_MAKES.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          {engineMake === 'Other (type below)' && (
            <input value={customEngineMake} onChange={e => setCustomEngineMake(e.target.value)}
              placeholder="Type engine make…" className={ic}/>
          )}
          <div className="grid grid-cols-2 gap-3">
            <div><label className={lc}>Engine model</label><input value={engineModel} onChange={e=>setEngineModel(e.target.value)} placeholder="F150XCA…" className={ic}/></div>
            <div><label className={lc}>Engine HP</label><input value={engineHp} onChange={e=>setEngineHp(e.target.value)} placeholder="150" type="number" className={ic}/></div>
          </div>

          {/* BOAT */}
          <p className="text-xs font-semibold text-slate-500 uppercase tracking-widest pt-1">Boat</p>

/**
 * Default capability state — all false / 'not_sure' so trees are shown
 * unless the user explicitly said they don't have that equipment.
 */
const DEFAULT_CAPABILITIES = {
  hasShorePower:        false,
  hasGenerator:         false,
  generatorBrand:       null,
  hasHVAC:              false,
  hasFreshwaterCooling: false,
  hasDualBattery:       false,
  hasTrimTabs:          false,
  hasBilgeBlower:       false,
  steeringType:         'not_sure',
  hasFuelInjection:     'not_sure',
  hasFwPump:            false,
  hasRwPump:            false,
  hasWindlass:          false,
  windlassBrand:        null,
  hasStereo:            false,
  hasAmp:               false,
  hasElectronics:       false,
  electronicsBrand:     null,
};

/**
 * Filter TREES to only those relevant for the given capabilities.
 * Trees without a `requires` key are always shown.
 * Trees with `requires` are shown only when the capability is truthy.
 */
function visibleTrees(capabilities = DEFAULT_CAPABILITIES) {
  return Object.values(TREES).filter(tree => {
    if (!tree.requires) return true;
    return Object.entries(tree.requires).every(([k, v]) => capabilities[k] === v);
  });
}

function OnboardingFlow({ clientId, onComplete }) {
  const [screen, setScreen]     = React.useState(0);
  const [safety, setSafety]     = React.useState(false);
  const [terms, setTerms]       = React.useState(false);
  const [privacy, setPrivacy]   = React.useState(false);
  const [saving, setSaving]     = React.useState(false);
  const [saveErr, setSaveErr]   = React.useState(null);
  const [make, setMake]               = React.useState('');
  const [customMake, setCustomMake]   = React.useState('');
  const [model, setModel]             = React.useState('');
  const [year, setYear]               = React.useState('');
  const [engineType, setEngineType]   = React.useState('');
  const [engineMake, setEngineMake]   = React.useState('');
  const [customEngineMake, setCustomEngineMake] = React.useState('');
  const [engineModel, setEngineModel] = React.useState('');
  const [engineHp, setEngineHp]       = React.useState('');
  const [hullLen, setHullLen]         = React.useState('');
  const [boatType, setBoatType]       = React.useState('');
  const [hvac, setHvac]               = React.useState('');
  const [saltwater, setSaltwater]     = React.useState(true);

  // ── Capabilities (screen 5) ───────────────────────────────
  const [hasShorePower,        setHasShorePower]        = React.useState(false);
  const [hasGenerator,         setHasGenerator]         = React.useState(false);
  const [hasHVAC,              setHasHVAC]              = React.useState(false);
  const [hasFreshwaterCooling, setHasFreshwaterCooling] = React.useState(false);
  const [hasDualBattery,       setHasDualBattery]       = React.useState(false);
  const [hasTrimTabs,          setHasTrimTabs]          = React.useState(false);
  const [hasBilgeBlower,       setHasBilgeBlower]       = React.useState(false);
  const [steeringType,         setSteeringType]         = React.useState('not_sure');
  const [hasFuelInjection,     setHasFuelInjection]     = React.useState('not_sure');

  const [hasFwPump,              setHasFwPump]              = React.useState(false);
  const [hasRwPump,              setHasRwPump]              = React.useState(false);
  const [hasWindlass,            setHasWindlass]            = React.useState(false);
  const [windlassBrand,          setWindlassBrand]          = React.useState('');
  const [customWindlassBrand,    setCustomWindlassBrand]    = React.useState('');
  const [hasStereo,              setHasStereo]              = React.useState(false);
  const [hasAmp,                 setHasAmp]                 = React.useState(false);
  const [hasElectronics,         setHasElectronics]         = React.useState(false);
  const [electronicsBrand,       setElectronicsBrand]       = React.useState('');
  const [customElectronicsBrand, setCustomElectronicsBrand] = React.useState('');
  const [generatorBrand,         setGeneratorBrand]         = React.useState('');
  const [customGeneratorBrand,   setCustomGeneratorBrand]   = React.useState('');

  // Saved after screen 4 so screen 5 can reference it
  const [savedBoatId,    setSavedBoatId]    = React.useState(null);
  const [savedBoatLabel, setSavedBoatLabel] = React.useState('');

  const next = () => setScreen(s => s + 1);

  const ack = async (type) => {
    try {
      await fetch(`${API_BASE}/api/onboarding/acknowledge`, {
        method: 'POST',
        headers: apiHeaders(clientId),
        body: JSON.stringify({ ack_type: type }),
      });
    } catch {}
  };

  // Screen 4 → save boat profile, then advance to capabilities screen
  const saveBoatAndNext = async () => {
    if (!engineType) { setSaveErr('Engine type is required.'); return; }
    setSaving(true); setSaveErr(null);

    // Always build label + save details locally — never wait on the API for this
    const resolvedMake = make === 'Other (type below)' ? customMake : make;
    const resolvedEngineMake = engineMake === 'Other (type below)' ? customEngineMake : engineMake;
    const label = [year, resolvedMake, model].filter(Boolean).join(' ') ||
                  ENGINE_TYPE_OPTIONS.find(o => o.value === engineType)?.label || '';
    localStorage.setItem(BOAT_LABEL_KEY, label);
    localStorage.setItem(BOAT_DETAILS_KEY, JSON.stringify({
      make: resolvedMake, model, year, boatType, engineType,
      engineMake: resolvedEngineMake, engineModel, engineHp, hullLen, saltwater, hvac
    }));
    setSavedBoatLabel(label);

    try {
      const res = await fetch(`${API_BASE}/api/boats`, {
        method: 'POST',
        headers: apiHeaders(clientId),
        body: JSON.stringify({
          make: make || null, model: model || null,
          year: year ? Number(year) : null,
          boat_type: boatType || null,
          engine_type: engineType,
          engine_make: resolvedEngineMake || null,
          engine_model: engineModel || null,
          engine_hp: engineHp ? Number(engineHp) : null,
          hull_length: hullLen ? Number(hullLen) : null,
          hvac: hvac || null, saltwater,
        }),
      });
      if (res.ok) {
        const boat = await res.json();
        if (boat.id) { setSavedBoatId(boat.id); localStorage.setItem(BOAT_ID_KEY, boat.id); }
      }
    } catch { /* network unavailable — local save above is sufficient */ }
    finally { setSaving(false); }
    next();
  };

  // Screen 5 → save capabilities to localStorage, complete onboarding
  const finishOnboarding = () => {
    const caps = {
      hasShorePower, hasGenerator,
      generatorBrand: hasGenerator ? (generatorBrand === 'Other (type below)' ? customGeneratorBrand : generatorBrand) : null,
      hasHVAC, hasFreshwaterCooling, hasDualBattery, hasTrimTabs, hasBilgeBlower,

/* ── PhotoIdentView ─────────────────────────────────────────── */
function PhotoIdentView({ onBack, clientId, boatDetails, isDevMode, onOpenTree }) {
  const [phase,    setPhase]    = React.useState('pick');
  const [preview,  setPreview]  = React.useState(null);
  const [imageB64, setImageB64] = React.useState(null);
  const [mediaType,setMediaType]= React.useState(null);
  const [result,   setResult]   = React.useState(null);
  const [err,      setErr]      = React.useState(null);
  const fileRef = React.useRef();

  const TREE_LABELS = {
    engine_overheat:'Engine Overheating', no_start:'Engine Won\'t Start',
    engine_alarm:'Engine Alarm', bilge_pump:'Bilge Pump', marine_ac:'AC / HVAC',
    electrical:'Electrical / No Power', nav_lights:'Navigation Lights',
    generator:'Generator', steering:'Steering', tilt_trim:'Tilt / Trim',
    radio_no_power:'Stereo Won\'t Come On', speakers_no_sound:'Speakers Don\'t Work',
    wont_shift:'Won\'t Shift Into Gear', exhaust_smoke:'Exhaust Smoke',
    vibration:'Vibration', fw_pump_cycling:'FW Pump Cycling', head_flush:'Toilet / Head',
    livewell:'Livewell / Bait Tank', fridge_not_cooling:'Refrigerator',
    vhf_radio:'VHF Radio', chartplotter:'Chartplotter / GPS',
    windlass_fault:'Windlass', outlet_dead:'12V Outlet',
  };

  const confColor = { high:'text-green-400', medium:'text-yellow-400', low:'text-red-400' };

  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      setPreview(dataUrl);
      const [header, b64] = dataUrl.split(',');
      const mt = (header.match(/data:([^;]+)/) || [])[1] || 'image/jpeg';
      setImageB64(b64);
      setMediaType(mt);
      setPhase('pick');
      setErr(null);
    };
    reader.readAsDataURL(file);
  };

  const handleIdentify = async () => {
    if (!imageB64) return;
    setPhase('loading');
    setErr(null);
    try {
      const res = await fetch(API_BASE + '/api/identify-part', {
        method: 'POST',
        headers: { ...apiHeaders(clientId), 'content-type': 'application/json' },
        body: JSON.stringify({ imageBase64: imageB64, mediaType, boat: boatDetails || null }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      setResult(data.result);
      setPhase('result');
    } catch (e) {
      setErr((e && e.message) || 'Something went wrong. Try again.');
      setPhase('error');
    }
  };

  const reset = () => {
    setPhase('pick'); setPreview(null); setImageB64(null);
    setMediaType(null); setResult(null); setErr(null);
  };

  return (
    <div className="max-w-xl mx-auto px-4 pb-14">
      <div className="flex items-center gap-3 py-5">
        <button onClick={onBack}
          className="w-9 h-9 rounded-full bg-hull-800 hover:bg-hull-700 flex items-center justify-center text-slate-300 transition-colors">&#8249;</button>
        <div className="flex-1">
          <div className="flex items-center gap-2">
            <span className="text-xl">&#128248;</span>
            <span className="font-semibold text-white">Identify a Part</span>
            {isDevMode && <span className="text-xs bg-amber-500 text-hull-950 font-bold px-1.5 py-0.5 rounded-full">PRO</span>}
          </div>
          <div className="text-xs text-slate-500 mt-0.5">Photo &#8594; instant part ID, failure modes &amp; where to buy</div>
        </div>
      </div>

      {(phase === 'pick' || phase === 'error') && (
        <div>
          {!preview ? (
            <button onClick={() => fileRef.current && fileRef.current.click()}
              className="w-full rounded-2xl border-2 border-dashed border-hull-600 hover:border-ocean-500 bg-hull-800/40 hover:bg-hull-800 transition-all py-16 flex flex-col items-center gap-4">
              <span className="text-6xl">&#128247;</span>
              <div className="text-center">
                <div className="text-white font-semibold mb-1">Take or choose a photo</div>
                <div className="text-slate-400 text-sm">Opens camera or gallery</div>
              </div>
            </button>
          ) : (
            <div className="space-y-4">
              <div className="relative rounded-2xl overflow-hidden bg-hull-800 border border-hull-700">
                <img src={preview} alt="Part" className="w-full max-h-80 object-contain"/>
                <button onClick={reset}
                  className="absolute top-3 right-3 w-8 h-8 rounded-full bg-hull-950/80 flex items-center justify-center text-slate-300 hover:text-white transition-colors text-lg">&#x2715;</button>
              </div>
              <button onClick={handleIdentify}
                className="w-full py-4 rounded-2xl bg-ocean-600 hover:bg-ocean-500 text-white font-semibold transition-colors text-base">
                &#128269; Identify This Part
              </button>
              <button onClick={() => fileRef.current && fileRef.current.click()}
                className="w-full py-3 rounded-2xl border border-hull-700 hover:border-hull-600 bg-hull-800/60 text-slate-300 text-sm transition-colors">
                Choose a different photo
              </button>
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*" capture="environment"
            className="hidden" onChange={handleFile}/>
          {phase === 'error' && (
            <div className="mt-4 p-4 rounded-xl border border-red-500/40 bg-red-900/20">
              <div className="text-red-300 text-sm font-semibold mb-1">Could not identify part</div>
              <div className="text-red-400 text-xs">{err}</div>
              <button onClick={() => setPhase('pick')} className="mt-2 text-xs text-ocean-400 hover:text-ocean-300">Try again</button>
            </div>
          )}
          <div className="mt-6 bg-hull-800/60 border border-hull-700 rounded-2xl p-4">
            <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Tips for best results</p>
            <ul className="text-xs text-slate-400 space-y-1.5">
              <li className="flex gap-2"><span className="text-ocean-400">&#10003;</span> Fill the frame with the part</li>
              <li className="flex gap-2"><span className="text-ocean-400">&#10003;</span> Good lighting, no heavy shadows</li>
              <li className="flex gap-2"><span className="text-ocean-400">&#10003;</span> Include any labels or model numbers</li>
              <li className="flex gap-2"><span className="text-slate-500">&#x2717;</span> Avoid blurry or backlit shots</li>
            </ul>
          </div>
        </div>
      )}

      {phase === 'loading' && (
        <div className="flex flex-col items-center py-20 gap-6">
          {preview && (
            <img src={preview} alt="Analyzing" className="w-40 h-40 object-contain rounded-2xl border border-hull-700 opacity-60"/>
          )}
          <div className="text-center">
            <div className="text-white font-semibold mb-2">Analyzing the part&#8230;</div>
            <div className="text-slate-400 text-sm">Usually takes 3&#8211;5 seconds</div>
          </div>
          <div className="flex gap-2">
            <div className="w-2 h-2 rounded-full bg-ocean-500 animate-bounce" style={{animationDelay:'0ms'}}/>
            <div className="w-2 h-2 rounded-full bg-ocean-500 animate-bounce" style={{animationDelay:'150ms'}}/>
            <div className="w-2 h-2 rounded-full bg-ocean-500 animate-bounce" style={{animationDelay:'300ms'}}/>
          </div>
        </div>
      )}

      {phase === 'result' && result && (
        <div className="space-y-4">
          <div className="rounded-2xl overflow-hidden border border-hull-700 bg-hull-800">
            <img src={preview} alt="Identified" className="w-full max-h-48 object-contain bg-hull-900"/>
            <div className="p-4">
              <div className="flex items-start justify-between gap-3">
                <h2 className="text-white font-bold text-lg leading-tight">{result.part_name}</h2>
                <span className={"text-xs font-semibold flex-shrink-0 mt-1 " + (confColor[result.confidence] || 'text-slate-400')}>
                  {result.confidence === 'high' ? '&#9679; High confidence' : result.confidence === 'medium' ? '&#9679; Medium' : '&#9679; Low confidence'}
                </span>
              </div>
              <p className="text-slate-300 text-sm mt-2 leading-relaxed">{result.what_it_does}</p>
            </div>
          </div>

          {result.common_failures && result.common_failures.length > 0 && (
            <div className="rounded-2xl border border-hull-700 bg-hull-800/60 p-4">
              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Common Failure Symptoms</p>
              <ul className="space-y-2">
                {result.common_failures.map(function(f, i) {
                  return (
                    <li key={i} className="flex gap-2 text-sm text-slate-300">
                      <span className="text-amber-400 flex-shrink-0">&#9888;</span>{f}
                    </li>
                  );
                })}
              </ul>
            </div>
          )}

          {result.related_tree && TREE_LABELS[result.related_tree] && (
            <div className="rounded-2xl border border-ocean-500/40 bg-ocean-900/20 p-4">
              <p className="text-xs font-semibold text-ocean-400 uppercase tracking-wider mb-2">Related Diagnostic Tree</p>
              <p className="text-slate-300 text-sm mb-3">Helmly has a step-by-step guide for issues with this part.</p>
              <button onClick={() => { onOpenTree(result.related_tree); onBack(); }}
                className="flex items-center gap-2 w-full px-4 py-3 rounded-xl bg-ocean-600/30 hover:bg-ocean-600/50 border border-ocean-500/40 text-ocean-300 font-semibold text-sm transition-colors">
                <span>&#128295;</span>
                Open &quot;{TREE_LABELS[result.related_tree]}&quot; Tree
                <span className="ml-auto">&#8594;</span>
              </button>
            </div>
          )}

          {result.search_terms && result.search_terms.length > 0 && (
            <div className="rounded-2xl border border-hull-700 bg-hull-800/60 p-4">
              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Search for a Replacement</p>
              <div className="flex flex-col gap-2">
                {result.search_terms.map(function(term, i) {
                  return (
                    <a key={i}
                       href={"https://www.amazon.com/s?k=" + encodeURIComponent(term + " marine boat") + "&tag=helmly-20"}
                       target="_blank" rel="noopener noreferrer"
                       className="flex items-center gap-2 px-3 py-2.5 rounded-xl bg-hull-900 hover:bg-hull-700 border border-hull-600 text-slate-300 text-sm transition-colors">
                      <span>&#128722;</span>
                      <span className="flex-1">{term}</span>
                      <span className="text-slate-500 text-xs">Amazon &#8594;</span>
                    </a>
                  );
                })}
              </div>
            </div>
          )}

          {result.notes && (
            <div className="rounded-2xl border border-hull-700 bg-hull-800/60 p-4">
              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Tech Note</p>
              <p className="text-slate-300 text-sm leading-relaxed">{result.notes}</p>
            </div>
          )}

          <div className="flex gap-3 pt-2">
            <button onClick={reset}
              className="flex-1 py-3 rounded-2xl border border-hull-700 hover:border-hull-600 bg-hull-800/60 text-slate-300 text-sm transition-colors">
              &#128247; Try Another
            </button>
            <button onClick={onBack}
              className="flex-1 py-3 rounded-2xl bg-ocean-600/20 hover:bg-ocean-600/40 border border-ocean-500/30 text-ocean-300 text-sm transition-colors">
              &#8592; Home
            </button>
          </div>
          <p className="text-center text-slate-600 text-xs pt-2">AI identification &#8212; verify visually before ordering.</p>
        </div>
      )}
    </div>
  );
}


function App() {
  const [clientId]          = React.useState(() => getOrCreateClientId());
  const [onboardingDone, setOnboardingDone] = React.useState(() => !!localStorage.getItem(ONBOARDING_KEY));
  const [boatId,    setBoatId]    = React.useState(() => localStorage.getItem(BOAT_ID_KEY)    || null);
  const [boatLabel, setBoatLabel] = React.useState(() => localStorage.getItem(BOAT_LABEL_KEY) || '');
  const [boatDetails, setBoatDetails] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(BOAT_DETAILS_KEY) || 'null'); } catch { return null; }
  });
  const [activeTree,    setActiveTree]    = React.useState(null);
  const [showAI,        setShowAI]        = React.useState(false);
  const [showProWall,   setShowProWall]   = React.useState(false);
  const [showToolKit,   setShowToolKit]   = React.useState(false);
  const [showEditBoat,  setShowEditBoat]  = React.useState(false);
  const [showPhotoIdent, setShowPhotoIdent] = React.useState(false);
  const [showDevPanel,  setShowDevPanel]  = React.useState(false);
  const [isDevMode,     setIsDevMode]     = React.useState(() => getIsDevMode());
  const [capabilities, setCapabilities] = React.useState(() => {
    try {
      const stored = localStorage.getItem(CAPABILITIES_KEY);
      return stored ? JSON.parse(stored) : DEFAULT_CAPABILITIES;
    } catch { return DEFAULT_CAPABILITIES; }
  });

  const handleOnboardComplete = ({ boatId: id, label, capabilities: caps }) => {
    if (id)    setBoatId(id);
    if (label) setBoatLabel(label);
    if (caps)  setCapabilities(caps);
    try { setBoatDetails(JSON.parse(localStorage.getItem(BOAT_DETAILS_KEY) || 'null')); } catch {}
    setOnboardingDone(true);
  };

  const handleEditSave = ({ label, details, capabilities: caps }) => {
    setBoatLabel(label);
    setBoatDetails(details);
    setCapabilities(caps);
    setShowEditBoat(false);
  };

  // Chat with Expert: devMode → real chat; otherwise → paywall screen
  const handleOpenPhotoIdent = () => {
    if (isDevMode) setShowPhotoIdent(true);
    else setShowProWall(true);
  };

  const handleOpenAI = () => {
    if (isDevMode) setShowAI(true);
    else setShowProWall(true);
  };

  if (!onboardingDone) return <OnboardingFlow clientId={clientId} onComplete={handleOnboardComplete}/>;
  if (showAI) return <AIChatView onBack={() => setShowAI(false)} clientId={clientId} boatId={boatId} boatLabel={boatLabel} boatDetails={boatDetails} capabilities={capabilities} isDevMode={isDevMode}/>;
  if (showProWall) return <ProPaywallScreen onBack={() => setShowProWall(false)}/>;
  if (showToolKit) return <ToolKitScreen onBack={() => setShowToolKit(false)}/>;
  if (showPhotoIdent) return <PhotoIdentView onBack={() => setShowPhotoIdent(false)} clientId={clientId} boatDetails={boatDetails} isDevMode={isDevMode} onOpenTree={setActiveTree}/>;
  if (activeTree) return <DiagnosisView tree={TREES[activeTree]} onBack={() => setActiveTree(null)} onOpenAI={handleOpenAI} boatId={boatId} clientId={clientId}/>;
  return (
    <>
      <Home onSelect={setActiveTree} onOpenAI={handleOpenAI} onOpenToolKit={() => setShowToolKit(true)} onOpenPhotoIdent={handleOpenPhotoIdent}
            capabilities={capabilities} boatLabel={boatLabel} boatDetails={boatDetails}
            onEditBoat={() => setShowEditBoat(true)}
            isDevMode={isDevMode} onOpenDevPanel={() => {
              // Activate dev mode on first open (5-tap unlock)
              if (!isDevMode) {
                localStorage.setItem(DEV_MODE_KEY, 'true');
                setIsDevMode(true);
              }
              setShowDevPanel(true);
            }}/>
      {showEditBoat && <EditBoatSheet onClose={() => setShowEditBoat(false)} onSave={handleEditSave}/>}
      {showDevPanel && <DevSettingsPanel onClose={() => setShowDevPanel(false)} onDisable={() => { setIsDevMode(false); setShowDevPanel(false); }}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);

/* ── service worker registration ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
